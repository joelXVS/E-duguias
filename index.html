<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-duguias</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="logo.png">
</head>
<body>
  <header>
    <h1>E-duguias 📘</h1>
    <p>Plataforma de guías en línea para estudiantes activos</p>
  </header>

  <section class="controls">
    <h2>📚 Guías disponibles</h2>
    <div class="filter-box">
      <label for="filter">Filtrar por:</label>
      <select id="filter">
        <option value="todas">Todas</option>
        <option value="pendiente">Pendientes</option>
        <option value="expirada">Expiradas</option>
        <option value="obligatoria">Obligatorias</option>
        <option value="participativa">Participativas</option>
      </select>

      <label for="gradeFilter" style="margin-left:1rem;">Grado:</label>
      <select id="gradeFilter">
        <option value="todos">Todos</option>
      </select>
    </div>
  </section>

  <main id="course-list">
    <!-- JS inserta cards de guías -->
  </main>

  <footer>
    <p>© 2025 E-duguias | Diseñado para estudiantes</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
